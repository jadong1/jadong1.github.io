<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pixels">
  <title>Year in Pixels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
      background: #fff;
      color: #222;
      min-height: 100dvh;
    }
    .container { max-width: 420px; margin: 0 auto; padding: 24px 16px; }

    /* ── Setup ── */
    .setup-title { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
    .setup-sub { color: #888; font-size: 14px; line-height: 1.5; margin-bottom: 28px; }
    .input-label { font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.3px; margin-bottom: 6px; display: block; }
    .url-input {
      width: 100%; padding: 12px 14px; font-size: 14px;
      border: 1px solid #e0e0e0; border-radius: 12px; outline: none;
      margin-bottom: 20px; font-family: inherit;
    }
    .url-input:focus { border-color: #7cb342; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
      color: #fff; background: #2e7d32; border: none; border-radius: 12px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.2px;
    }
    .btn-primary:disabled { background: #d0d0d0; cursor: default; }
    .btn-primary.saved { background: #43a047; }

    /* ── Header ── */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-btn {
      background: none; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; color: #555;
    }

    /* ── Date nav ── */
    .date-nav { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .nav-btn {
      width: 38px; height: 38px; border-radius: 50%; border: 1px solid #e0e0e0;
      background: #fff; font-size: 20px; cursor: pointer; color: #555; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
    }
    .date-label {
      font-size: 17px; font-weight: 600; min-width: 160px; text-align: center;
      background: none; border: none; cursor: pointer; padding: 6px 0; font-family: inherit;
    }
    .date-label .today-badge { font-size: 11px; color: #7cb342; margin-left: 6px; }

    /* ── Rating grid ── */
    .rating-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .rating-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 4px 10px; border: 2px solid transparent; border-radius: 12px;
      cursor: pointer; transition: all 0.15s ease;
    }
    .rating-btn .num { font-size: 22px; font-weight: 700; line-height: 1; }
    .rating-btn .lbl { font-size: 9px; font-weight: 500; margin-top: 1px; letter-spacing: 0.2px; }
    .rating-btn.selected { transform: scale(1.08); }

    /* ── Note ── */
    .note-input {
      width: 100%; padding: 12px 14px; font-size: 14px;
      border: 1px solid #e0e0e0; border-radius: 12px;
      margin-bottom: 16px; font-family: inherit; resize: vertical;
      line-height: 1.5; outline: none;
    }
    .note-input:focus { border-color: #7cb342; }

    /* ── Status ── */
    .error-text { color: #d32f2f; font-size: 13px; text-align: center; margin-top: 10px; line-height: 1.4; }
    .reset-btn {
      background: none; border: none; color: #aaa; font-size: 12px;
      cursor: pointer; display: block; margin: 20px auto 0; padding: 4px;
    }
    .loading-text { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    /* ── Grid view ── */
    .grid-wrap { overflow-x: auto; margin: 0 -8px; padding: 0 8px; }
    .grid-table { border-collapse: separate; border-spacing: 2px; width: 100%; }
    .grid-table th.month-hdr { font-size: 10px; font-weight: 600; color: #888; text-align: center; padding-bottom: 4px; }
    .grid-table td.day-label { font-size: 9px; color: #aaa; text-align: center; padding-right: 2px; width: 20px; }
    .grid-table td.cell {
      aspect-ratio: 1; border-radius: 2px; text-align: center;
      vertical-align: middle; padding: 0; cursor: pointer;
      font-size: 8px; font-weight: 700; color: #fff; text-shadow: 0 0 2px rgba(0,0,0,0.3);
    }
    .legend { display: flex; flex-wrap: wrap; gap: 4px 12px; margin-top: 16px; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
    .legend-label { font-size: 10px; color: #888; }
  </style>
</head>
<body>

<div id="app" class="container"></div>

<script>
// ══ Config ══
const RATINGS = [
  { value: 0, color: '#d32f2f', label: 'worst' },
  { value: 1, color: '#e53935', label: 'terrible' },
  { value: 2, color: '#f4511e', label: 'damn' },
  { value: 3, color: '#ef6c00', label: 'bad' },
  { value: 4, color: '#f9a825', label: 'below avg' },
  { value: 5, color: '#fdd835', label: 'neutral' },
  { value: 6, color: '#c0ca33', label: 'alright' },
  { value: 7, color: '#7cb342', label: 'good' },
  { value: 8, color: '#43a047', label: 'great' },
  { value: 9, color: '#2e7d32', label: 'fantastic' },
  { value: 10, color: '#00897b', label: 'best day' },
];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ══ State ══
let state = {
  scriptUrl: localStorage.getItem('yip_url') || '',
  view: 'log',            // 'log' | 'grid'
  selectedDate: new Date(),
  rating: null,
  note: '',
  saving: false,
  loading: false,
  status: '',              // '' | 'saved' | 'save_error' | 'load_error'
  yearData: {},
  gridLoading: false,
};

const $ = id => document.getElementById(id);
const app = document.getElementById('app');

function getColor(val) {
  const r = RATINGS.find(x => x.value === Number(val));
  return r ? r.color : 'transparent';
}
function getBg(val) { return getColor(val) + '20'; }
function daysInMonth(m, y) { return new Date(y, m, 0).getDate(); }
function fmtDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function isToday(d) { return d.toDateString() === new Date().toDateString(); }

// ══ API ══
async function api(params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(state.scriptUrl + '?' + qs, { redirect: 'follow' });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadDay() {
  state.loading = true; state.status = ''; render();
  try {
    const m = state.selectedDate.getMonth() + 1;
    const d = state.selectedDate.getDate();
    const data = await api({ action: 'get', month: m, day: d });
    state.rating = (data.rating === null || data.rating === '') ? null : Number(data.rating);
    state.note = data.note || '';
  } catch { state.status = 'load_error'; }
  state.loading = false; render();
}

async function saveDay() {
  if (state.rating === null) return;
  state.saving = true; state.status = ''; render();
  try {
    const m = state.selectedDate.getMonth() + 1;
    const d = state.selectedDate.getDate();
    await api({ action: 'set', month: m, day: d, rating: state.rating, note: state.note });
    state.status = 'saved';
    if (!state.yearData[m]) state.yearData[m] = {};
    state.yearData[m][d] = { rating: state.rating, note: state.note };
    setTimeout(() => { state.status = ''; render(); }, 2500);
  } catch { state.status = 'save_error'; }
  state.saving = false; render();
}

async function loadYear() {
  state.gridLoading = true; render();
  try {
    state.yearData = await api({ action: 'getAll' });
  } catch { state.status = 'load_error'; }
  state.gridLoading = false; render();
}

function shiftDate(delta) {
  const d = new Date(state.selectedDate);
  d.setDate(d.getDate() + delta);
  state.selectedDate = d;
  state.rating = null; state.note = ''; state.status = '';
  render();
  if (state.scriptUrl) loadDay();
}

function goToToday() {
  state.selectedDate = new Date();
  state.rating = null; state.note = ''; state.status = '';
  render();
  if (state.scriptUrl) loadDay();
}

// ══ Render ══
function render() {
  if (!state.scriptUrl) return renderSetup();
  if (state.view === 'grid') return renderGrid();
  renderLog();
}

function renderSetup() {
  app.innerHTML = `
    <div style="margin-bottom:32px">
      <h1 class="setup-title">Year in Pixels</h1>
      <p class="setup-sub">Paste your Apps Script deployment URL to connect to your spreadsheet.</p>
    </div>
    <label class="input-label">Script URL</label>
    <input id="url-in" class="url-input" type="url" placeholder="https://script.google.com/macros/s/..." value="">
    <button id="connect-btn" class="btn-primary" disabled>Connect</button>
  `;
  const inp = $('url-in');
  const btn = $('connect-btn');
  inp.addEventListener('input', () => { btn.disabled = !inp.value.trim(); });
  btn.addEventListener('click', () => {
    const url = inp.value.trim();
    if (!url) return;
    localStorage.setItem('yip_url', url);
    state.scriptUrl = url;
    render();
    loadDay();
  });
}

function renderLog() {
  const today = isToday(state.selectedDate);
  const dateStr = fmtDate(state.selectedDate);

  let ratingBtns = RATINGS.map(r => {
    const sel = state.rating === r.value;
    const bg = sel ? r.color : getBg(r.value);
    const border = sel ? r.color : 'transparent';
    const numColor = sel ? '#fff' : r.color;
    const lblColor = sel ? 'rgba(255,255,255,0.8)' : '#888';
    const transform = sel ? 'scale(1.08)' : 'scale(1)';
    const shadow = sel ? `0 2px 8px ${r.color}66` : 'none';
    return `<button class="rating-btn ${sel ? 'selected' : ''}" data-val="${r.value}"
      style="background:${bg};border-color:${border};transform:${transform};box-shadow:${shadow}">
      <span class="num" style="color:${numColor}">${r.value}</span>
      <span class="lbl" style="color:${lblColor}">${r.label}</span>
    </button>`;
  }).join('');

  const saveBg = state.status === 'saved' ? '#43a047' : (state.rating !== null ? '#2e7d32' : '#d0d0d0');
  const saveText = state.saving ? 'Saving…' : (state.status === 'saved' ? '✓ Saved to Sheet' : 'Save');
  const saveDisabled = state.rating === null || state.saving;

  app.innerHTML = `
    <div class="header">
      <h1 class="header-title">Year in Pixels</h1>
      <button id="grid-btn" class="header-btn">Grid →</button>
    </div>
    <div class="date-nav">
      <button id="prev-btn" class="nav-btn">‹</button>
      <button id="today-btn" class="date-label">
        ${dateStr}${today ? '<span class="today-badge">today</span>' : ''}
      </button>
      <button id="next-btn" class="nav-btn">›</button>
    </div>
    ${state.loading ? '<p class="loading-text">Loading…</p>' : `
      <div class="rating-grid">${ratingBtns}</div>
      <textarea id="note-in" class="note-input" rows="3" placeholder="Short reflection (optional)">${state.note}</textarea>
      <button id="save-btn" class="btn-primary ${state.status === 'saved' ? 'saved' : ''}"
        style="background:${saveBg};opacity:${state.saving ? 0.7 : 1}"
        ${saveDisabled ? 'disabled' : ''}>${saveText}</button>
      ${(state.status === 'save_error' || state.status === 'load_error')
        ? '<p class="error-text">Couldn\'t reach your sheet. Double-check the script URL and deployment settings.</p>' : ''}
      <button id="reset-btn" class="reset-btn">Change script URL</button>
    `}
  `;

  // Events
  $('grid-btn').addEventListener('click', () => { state.view = 'grid'; render(); loadYear(); });
  $('prev-btn').addEventListener('click', () => shiftDate(-1));
  $('next-btn').addEventListener('click', () => shiftDate(1));
  $('today-btn').addEventListener('click', goToToday);

  if (!state.loading) {
    document.querySelectorAll('.rating-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.rating = Number(btn.dataset.val);
        state.status = '';
        render();
      });
    });
    $('note-in').addEventListener('input', e => { state.note = e.target.value; });
    $('save-btn').addEventListener('click', saveDay);
    $('reset-btn').addEventListener('click', () => {
      localStorage.removeItem('yip_url');
      state.scriptUrl = '';
      render();
    });
  }
}

function renderGrid() {
  const year = state.selectedDate.getFullYear();

  let thead = '<tr><th style="width:20px"></th>' + MONTHS.map(m => `<th class="month-hdr">${m}</th>`).join('') + '</tr>';

  let tbody = '';
  for (let day = 1; day <= 31; day++) {
    tbody += `<tr><td class="day-label">${day}</td>`;
    for (let month = 1; month <= 12; month++) {
      const max = daysInMonth(month, year);
      if (day > max) {
        tbody += '<td></td>';
      } else {
        const entry = state.yearData?.[month]?.[day];
        const has = entry && entry.rating !== null && entry.rating !== '';
        const bg = has ? getColor(entry.rating) : '#f0f0f0';
        const text = has ? entry.rating : '';
        tbody += `<td class="cell" data-m="${month}" data-d="${day}" style="background:${bg}">${text}</td>`;
      }
    }
    tbody += '</tr>';
  }

  const legend = RATINGS.map(r => `
    <div class="legend-item">
      <div class="legend-swatch" style="background:${r.color}"></div>
      <span class="legend-label">${r.value} ${r.label}</span>
    </div>
  `).join('');

  app.innerHTML = `
    <div class="header">
      <h1 class="header-title">${year}</h1>
      <button id="back-btn" class="header-btn">← Log</button>
    </div>
    ${state.gridLoading ? '<p class="loading-text">Loading year…</p>' : `
      <div class="grid-wrap">
        <table class="grid-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>
      </div>
      <div class="legend">${legend}</div>
    `}
  `;

  $('back-btn').addEventListener('click', () => { state.view = 'log'; render(); loadDay(); });

  document.querySelectorAll('.cell[data-m]').forEach(cell => {
    cell.addEventListener('click', () => {
      const m = Number(cell.dataset.m);
      const d = Number(cell.dataset.d);
      state.selectedDate = new Date(year, m - 1, d);
      state.rating = null; state.note = ''; state.status = '';
      state.view = 'log';
      render();
      loadDay();
    });
  });
}

// ══ Init ══
render();
if (state.scriptUrl) loadDay();
</script>
</body>
</html>
